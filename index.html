<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade Calculator</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="container">
        <h1>Grade Calculator</h1>

        <div class="form">
            <label>Tamil:</label>
            <input type="number" id="sub1" placeholder="Enter marks">
            <span class="error" id="err1"></span>

            <label>English:</label>
            <input type="number" id="sub2" placeholder="Enter marks">
            <span class="error" id="err2"></span>

            <label>Maths:</label>
            <input type="number" id="sub3" placeholder="Enter marks">
            <span class="error" id="err3"></span>

            <label>Science:</label>
            <input type="number" id="sub4" placeholder="Enter marks">
            <span class="error" id="err4"></span>

            <label>Social Science:</label>
            <input type="number" id="sub5" placeholder="Enter marks">
            <span class="error" id="err5"></span>

            <button onclick="calculateGrade()">Calculate</button>

            <div id="result"></div>
        </div>

        <div id="result"></div>
    </div>

    <script src="js/index.js"></script>
</body>

</html>
